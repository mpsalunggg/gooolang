services:
  mysql:
    image: mysql:8.0
    container_name: mysql-pzn
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_DATABASE: belajargolang
      MYSQL_USER: golang
      MYSQL_PASSWORD: golang123
    ports:
      - '3307:3306'
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
